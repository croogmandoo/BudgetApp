<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <!--
      Content-Security-Policy is finalised at the server (SPEC section 7.4:
      strict CSP, no inline scripts, frame-ancestors 'none'). SvelteKit can
      emit a CSP from svelte.config.js, but the authoritative policy is set
      by the reverse proxy / Django in front of this SPA so that the same
      headers apply to API responses. Do not add inline <script> tags here.
    -->
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

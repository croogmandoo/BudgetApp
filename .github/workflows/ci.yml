name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default to least-privilege at the workflow level; jobs opt in to more as needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref (branches/PRs).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Django / Python 3.12)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231 # v5.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # mypy is non-blocking until the type coverage stabilises; flip this to
      # required (remove continue-on-error) once the backend has baseline typing.
      - name: mypy
        continue-on-error: true
        run: uv run mypy .

      - name: pytest
        run: uv run pytest -q

  frontend:
    name: Frontend (SvelteKit / Node 22)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v4.0.0
        with:
          # defaults.working-directory doesn't apply to action inputs; point
          # the packageManager resolver at the frontend package.json.
          package_json_file: frontend/package.json

      - name: Install Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type / svelte-check
        run: pnpm check

      - name: Test
        run: pnpm test
